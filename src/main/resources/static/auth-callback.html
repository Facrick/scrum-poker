<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Входим…</title>
    <style>
        body{background:#0d1117;color:#e6edf3;font-family:Inter,sans-serif;
             display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
    </style>
</head>
<body>
<p>⏳ Входим…</p>
<script>
    // OAuth2 successHandler редиректит сюда с токеном во фрагменте: /auth-callback.html#token=...
    // Фрагмент не уходит на сервер — кладём токен в localStorage и идём в кабинет.
    var token = new URLSearchParams(location.hash.slice(1)).get('token');
    if (token) {
        localStorage.setItem('sp_token', token);
        location.replace('/account');
    } else {
        location.replace('/login?error=true');
    }
</script>
</body>
</html>
