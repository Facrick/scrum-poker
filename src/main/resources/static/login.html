<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Войти — Scrum Poker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=20">
    <style>
        .login-card {
            max-width: 380px;
            margin: 0 auto;
            padding: 2.5rem 2rem;
        }
        .login-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: .4rem;
            text-align: center;
        }
        .login-sub {
            font-size: .85rem;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 1.8rem;
        }
        .oauth-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .65rem;
            width: 100%;
            padding: .75rem 1rem;
            border-radius: 10px;
            font-size: .95rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            border: 1.5px solid var(--border);
            background: var(--card);
            color: var(--text);
            transition: background .15s, border-color .15s;
            margin-bottom: .75rem;
        }
        .oauth-btn:hover {
            background: var(--bg);
            border-color: var(--accent);
        }
        .oauth-btn svg { flex-shrink: 0; }
        .login-back {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            font-size: .85rem;
            color: var(--text-muted);
            text-decoration: none;
        }
        .login-back:hover { color: var(--accent); }
        .login-error {
            background: #fee2e2;
            color: #b91c1c;
            border-radius: 8px;
            padding: .6rem .9rem;
            font-size: .85rem;
            margin-bottom: 1rem;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
<main class="lobby">
    <div class="lobby-card login-card">
        <div class="lobby-wordmark">
            <span class="lobby-suit">♠</span>
            <span class="lobby-brand">Scrum Poker</span>
        </div>
        <p class="login-title">Войти как модератор</p>
        <p class="login-sub">Для доступа к истории сессий и кабинету модератора</p>

        <div id="loginError" class="login-error">Ошибка входа. Попробуйте ещё раз.</div>

        <a class="oauth-btn" href="/oauth2/authorization/google">
            <svg width="20" height="20" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M43.611 20.083H42V20H24V28H35.303C33.654 32.657 29.223 36 24 36C17.373 36 12 30.627 12 24C12 17.373 17.373 12 24 12C27.059 12 29.842 13.154 31.961 15.039L37.618 9.382C34.046 6.053 29.268 4 24 4C12.955 4 4 12.955 4 24C4 35.045 12.955 44 24 44C35.045 44 44 35.045 44 24C44 22.659 43.862 21.35 43.611 20.083Z" fill="#FFC107"/>
                <path d="M6.306 14.691L12.877 19.51C14.655 15.108 18.961 12 24 12C27.059 12 29.842 13.154 31.961 15.039L37.618 9.382C34.046 6.053 29.268 4 24 4C16.318 4 9.656 8.337 6.306 14.691Z" fill="#FF3D00"/>
                <path d="M24 44C29.166 44 33.86 42.023 37.409 38.808L31.219 33.57C29.211 35.092 26.715 36 24 36C18.798 36 14.381 32.683 12.717 28.054L6.195 33.079C9.505 39.556 16.227 44 24 44Z" fill="#4CAF50"/>
                <path d="M43.611 20.083H42V20H24V28H35.303C34.511 30.237 33.072 32.166 31.216 33.571L31.219 33.57L37.409 38.808C36.971 39.205 44 34 44 24C44 22.659 43.862 21.35 43.611 20.083Z" fill="#1976D2"/>
            </svg>
            Войти через Google
        </a>

        <a class="oauth-btn" href="/oauth2/authorization/github">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
            </svg>
            Войти через GitHub
        </a>

        <a class="login-back" href="/">← Обратно к игре</a>
    </div>
</main>
<script>
    if (new URLSearchParams(location.search).has('error')) {
        document.getElementById('loginError').style.display = 'block';
    }
</script>
</body>
</html>
