<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кабинет модератора — Scrum Poker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=dev">
    <style>
        body { background: var(--bg); }

        .account-layout {
            max-width: 920px;
            margin: 0 auto;
            padding: 2rem 1rem 4rem;
        }

        /* Топбар */
        .acc-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: .75rem;
        }
        .acc-brand {
            display: flex;
            align-items: center;
            gap: .5rem;
            text-decoration: none;
            color: var(--text);
            font-size: 1.05rem;
            font-weight: 700;
        }
        .acc-brand .suit { color: var(--accent); font-size: 1.2rem; }
        .acc-actions { display: flex; gap: .5rem; align-items: center; }

        /* Профиль */
        .profile-card {
            position: relative;
            background:
                radial-gradient(900px 120px at 0% 0%, rgba(47,129,247,.10), transparent 60%),
                var(--card);
            border: 1.5px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.25rem;
            margin-bottom: 1.5rem;
        }
        .profile-avatar, .profile-avatar-placeholder {
            width: 64px; height: 64px; border-radius: 50%; flex-shrink: 0;
        }
        .profile-avatar { object-fit: cover; background: var(--border); }
        .profile-avatar-placeholder {
            background: var(--accent); color: #fff; font-size: 1.6rem; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
        }
        .profile-info { flex: 1; min-width: 0; }
        .profile-name { font-size: 1.15rem; font-weight: 700; color: var(--text); margin-bottom: .2rem; }
        .profile-email { font-size: .85rem; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; }
        .profile-provider {
            display: inline-block; margin-top: .5rem; font-size: .75rem; font-weight: 500;
            padding: .2rem .6rem; border-radius: 999px; background: var(--bg);
            border: 1px solid var(--border); color: var(--text-muted); text-transform: capitalize;
        }

        /* Сводка (стат-бар) */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: .75rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            padding: 1rem 1.1rem;
        }
        .stat-value { font-size: 1.5rem; font-weight: 800; color: var(--text); line-height: 1; }
        .stat-value .stat-sub { font-size: .9rem; font-weight: 600; color: var(--text-muted); }
        .stat-label { margin-top: .35rem; font-size: .78rem; color: var(--text-muted); }

        /* Заголовок секции */
        .section-head {
            display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 1rem;
        }
        .section-title { font-size: 1rem; font-weight: 700; color: var(--text); }
        .section-hint { font-size: .8rem; color: var(--text-muted); }

        /* Сетка карточек сессий */
        .sessions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: .85rem;
        }
        .sess-card {
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            padding: 1rem 1.1rem;
            display: flex;
            flex-direction: column;
            gap: .7rem;
            transition: border-color .15s, transform .15s;
        }
        .sess-card:hover { border-color: var(--border-2); transform: translateY(-2px); }
        .sess-card.live { border-left: 3px solid var(--success); }

        .sess-head { display: flex; align-items: flex-start; justify-content: space-between; gap: .5rem; }
        .sess-name { font-weight: 700; font-size: .98rem; color: var(--text); text-decoration: none; word-break: break-word; }
        .sess-name:hover { color: var(--accent); }
        .sess-status { flex-shrink: 0; font-size: .72rem; font-weight: 600; padding: .15rem .5rem; border-radius: 999px; white-space: nowrap; }
        .sess-status.live { color: var(--success); background: var(--success-l); }
        .sess-status.done { color: var(--text-muted); background: var(--bg); border: 1px solid var(--border); }

        /* Мета-строка: id · участники · дата */
        .sess-id { display: flex; align-items: center; flex-wrap: wrap; gap: .4rem; font-size: .76rem; color: var(--text-muted); }
        .sess-id code {
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: .74rem; color: var(--text-muted);
            background: var(--bg); border: 1px solid var(--border);
            padding: .1rem .4rem; border-radius: 6px;
        }
        .sess-dot { opacity: .5; }
        .sess-people, .sess-date { white-space: nowrap; }

        /* Задачи + прогресс */
        .sess-tasks { display: flex; flex-direction: column; gap: .35rem; }
        .sess-tasks-row { display: flex; align-items: baseline; justify-content: space-between; }
        .sess-tasks-label { font-size: .78rem; color: var(--text-muted); }
        .sess-tasks-count { font-size: .82rem; font-weight: 700; color: var(--text); }
        .progress-track { height: 6px; border-radius: 999px; background: var(--bg); overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 999px; background: var(--success); transition: width .3s; }
        .progress-fill.partial { background: var(--accent); }

        /* Действия */
        .sess-actions {
            display: flex; align-items: center; gap: .4rem;
            margin-top: .15rem; padding-top: .7rem; border-top: 1px solid var(--border);
        }
        .sess-enter {
            flex: 1; text-align: center;
            font-size: .85rem; font-weight: 600; color: #fff; background: var(--accent);
            text-decoration: none; padding: .4rem .75rem; border-radius: 8px; transition: opacity .15s;
        }
        .sess-enter:hover { opacity: .85; }
        .act-btn {
            display: inline-flex; align-items: center; justify-content: center;
            width: 30px; height: 30px; flex-shrink: 0;
            background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
            color: var(--text-muted); cursor: pointer; font-size: .85rem;
            text-decoration: none; transition: border-color .15s, color .15s, background .15s;
        }
        .act-btn:hover { border-color: var(--border-2); color: var(--text); }
        .act-btn.act-danger:hover { border-color: var(--danger); color: var(--danger); }

        /* Пустое состояние */
        .sessions-empty {
            grid-column: 1 / -1;
            padding: 3rem 1.5rem; text-align: center; color: var(--text-muted); font-size: .9rem;
            background: var(--card); border: 1.5px dashed var(--border); border-radius: 14px;
        }
        .sessions-empty strong { display: block; font-size: 1rem; font-weight: 600; color: var(--text); margin-bottom: .4rem; }
        .sessions-empty .btn-new-session { margin-top: 1rem; }

        /* Кнопки */
        .btn-new-session {
            background: var(--accent); color: #fff; border: none; border-radius: 8px;
            padding: .45rem .9rem; font-size: .85rem; font-weight: 600; cursor: pointer; transition: opacity .15s;
        }
        .btn-new-session:hover { opacity: .85; }
        .btn-new-session:disabled { opacity: .4; cursor: not-allowed; }
        .btn-logout {
            background: none; border: 1.5px solid var(--border); border-radius: 8px;
            padding: .45rem .9rem; font-size: .85rem; font-weight: 500; color: var(--text-muted);
            cursor: pointer; transition: border-color .15s, color .15s;
        }
        .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

        /* Скелетон */
        .skeleton {
            background: linear-gradient(90deg, var(--border) 25%, var(--bg) 50%, var(--border) 75%);
            background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 6px;
        }
        @keyframes shimmer { to { background-position: -200% 0; } }

        /* Тост */
        .toast {
            position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%) translateY(1rem);
            background: var(--card); border: 1px solid var(--border); color: var(--text);
            padding: .6rem 1rem; border-radius: 10px; font-size: .85rem; opacity: 0; pointer-events: none;
            transition: opacity .2s, transform .2s; z-index: 50;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.success { border-color: var(--success); }

        @media (max-width: 560px) {
            .stats-row { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
<div class="account-layout">

    <nav class="acc-topbar">
        <a class="acc-brand" href="/">
            <span class="suit">♠</span> Scrum Poker
        </a>
        <div class="acc-actions">
            <button class="btn-new-session" id="newSessionBtn">+ Новая сессия</button>
            <button class="btn-logout" id="logoutBtn">Выйти</button>
        </div>
    </nav>

    <!-- Профиль -->
    <div class="profile-card" id="profileCard">
        <div class="profile-avatar-placeholder skeleton"></div>
        <div class="profile-info">
            <div class="profile-name skeleton" style="width:160px;height:18px;margin-bottom:.4rem"></div>
            <div class="profile-email skeleton" style="width:220px;height:14px"></div>
        </div>
    </div>

    <!-- Сводка -->
    <div class="stats-row" id="statsRow" style="display:none">
        <div class="stat-card">
            <div class="stat-value" id="statTotal">0</div>
            <div class="stat-label">Всего сессий</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="statActive">0</div>
            <div class="stat-label">Активны сейчас</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="statEstimated">0<span class="stat-sub">/0</span></div>
            <div class="stat-label">Задач оценено</div>
        </div>
    </div>

    <!-- История сессий -->
    <div class="section-head">
        <span class="section-title">История сессий</span>
        <span class="section-hint" id="sessionsHint"></span>
    </div>
    <div class="sessions-grid" id="sessionsGrid">
        <!-- скелетон во время загрузки -->
        <div class="sess-card" id="sessionsSkeleton">
            <div class="skeleton" style="height:16px;width:60%"></div>
            <div class="skeleton" style="height:12px;width:40%"></div>
            <div class="skeleton" style="height:24px;width:80%"></div>
        </div>
    </div>

</div>

<div id="toast" class="toast"></div>

<script src="auth.js?v=dev"></script>
<script src="account.js?v=dev"></script>
</body>
</html>
