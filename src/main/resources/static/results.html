<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Итоги сессии — Scrum Poker</title>
    <style>
        :root {
            --bg: #0d1117; --surface: #1c2128; --surface-2: #21262d;
            --border: #30363d; --text: #e6edf3; --muted: #8b949e;
            --primary: #2f81f7; --success: #3fb950; --success-l: rgba(63,185,80,.12);
            --warn: #d29922;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Inter", system-ui, -apple-system, sans-serif;
            background: var(--bg); color: var(--text);
            line-height: 1.5; -webkit-font-smoothing: antialiased;
        }
        .page { max-width: 760px; margin: 0 auto; padding: 40px 24px 64px; }

        /* ── Header ── */
        .header { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 32px; flex-wrap: wrap; }
        .header-left { flex: 1; min-width: 0; }
        .back { font-size: 13px; color: var(--primary); text-decoration: none; display: inline-block; margin-bottom: 10px; }
        .back:hover { text-decoration: underline; }
        .room-title { font-size: 26px; font-weight: 800; color: var(--text); letter-spacing: -.02em; line-height: 1.2; }
        .room-id { font-size: 12px; color: var(--muted); margin-top: 4px; }
        .pdf-btn {
            flex-shrink: 0; display: inline-flex; align-items: center; gap: 6px;
            background: var(--primary); color: #fff; border: none; border-radius: 8px;
            padding: 10px 18px; font: inherit; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: opacity .15s; white-space: nowrap;
        }
        .pdf-btn:hover { opacity: .88; }

        /* ── Summary strip ── */
        .summary { display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; }
        .stat {
            flex: 1; min-width: 110px;
            background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
            padding: 14px 16px;
        }
        .stat-val { font-size: 22px; font-weight: 800; color: var(--text); line-height: 1; }
        .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: .06em; }

        /* ── Progress ── */
        .progress-wrap { margin-bottom: 28px; }
        .progress-track { height: 6px; background: var(--surface-2); border-radius: 99px; overflow: hidden; margin-top: 6px; }
        .progress-fill { height: 100%; background: var(--success); border-radius: 99px; }
        .progress-label { font-size: 12px; color: var(--muted); }

        /* ── Table ── */
        .table-wrap { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        thead th {
            text-align: left; padding: 10px 14px;
            background: var(--surface-2); border-bottom: 1px solid var(--border);
            font-size: 11px; font-weight: 600; color: var(--muted);
            text-transform: uppercase; letter-spacing: .06em;
        }
        tbody td { padding: 11px 14px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: top; }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover td { background: var(--surface); }
        .num { color: var(--muted); font-size: 12px; width: 32px; }
        .task-title { font-weight: 500; }
        .est-chip {
            display: inline-block; background: var(--success-l); color: var(--success);
            border: 1px solid rgba(63,185,80,.25); border-radius: 6px;
            padding: 2px 10px; font-weight: 700; font-size: 13px; white-space: nowrap;
        }
        .no-est { color: var(--muted); font-size: 13px; }

        /* ── States ── */
        .loading, .error { text-align: center; padding: 80px 20px; color: var(--muted); font-size: 15px; }
        .error strong { display: block; color: var(--text); font-size: 18px; margin-bottom: 8px; }

        /* ── Print styles ── */
        @media print {
            @page { size: A4; margin: 18mm 16mm; }
            body { background: #fff !important; color: #111 !important; }
            .back, .pdf-btn { display: none !important; }
            .page { padding: 0; max-width: 100%; }
            .room-title { color: #111; font-size: 20px; }
            .room-id { color: #666; }
            .stat { background: #f4f6f9 !important; border-color: #ddd !important; break-inside: avoid; }
            .stat-val { color: #111 !important; }
            .stat-lbl { color: #666 !important; }
            .progress-track { background: #e0e0e0 !important; }
            .progress-fill { background: #2e7d32 !important; }
            .progress-label { color: #666 !important; }
            .table-wrap { border-color: #ddd !important; }
            thead th { background: #f4f6f9 !important; color: #444 !important; border-bottom-color: #ddd !important; }
            tbody td { border-bottom-color: #eee !important; color: #111 !important; }
            tbody tr:hover td { background: transparent !important; }
            .num { color: #888 !important; }
            .est-chip { background: #e8f5e9 !important; color: #2e7d32 !important; border-color: #a5d6a7 !important; }
            .no-est { color: #999 !important; }
            .print-footer {
                display: block !important;
                margin-top: 24px; font-size: 11px; color: #aaa;
                border-top: 1px solid #eee; padding-top: 8px;
            }
        }
        .print-footer { display: none; }
    </style>
</head>
<body>
<div class="page">
    <div class="header">
        <div class="header-left">
            <a class="back" href="/account">← Кабинет</a>
            <div class="room-title" id="roomTitle">Загрузка…</div>
            <div class="room-id" id="roomId"></div>
        </div>
        <button class="pdf-btn" onclick="window.print()" id="pdfBtn" style="display:none">
            ⬇ Сохранить PDF
        </button>
    </div>
    <div id="content"><div class="loading">Загрузка данных сессии…</div></div>
    <div class="print-footer" id="printFooter"></div>
</div>
<script>
(async () => {
    const params = new URLSearchParams(location.search);
    const roomId = params.get('room');
    if (!roomId) { showError('Не указан код комнаты'); return; }
    document.getElementById('roomId').textContent = 'Код: ' + roomId;

    try {
        const res = await fetch('/api/public/sessions/' + encodeURIComponent(roomId));
        if (res.status === 404) { showError('Сессия не найдена или уже удалена'); return; }
        if (!res.ok) throw new Error();
        render(await res.json(), roomId);
    } catch { showError('Не удалось загрузить данные сессии'); }
})();

function render(data, roomId) {
    const title = data.roomName || roomId;
    document.getElementById('roomTitle').textContent = title;
    document.title = title + ' — Итоги';
    document.getElementById('pdfBtn').style.display = '';

    const items = data.items || [];
    const estimated = items.filter(i => i.estimate).length;
    const total = items.length;
    const pct = total > 0 ? Math.round(estimated / total * 100) : 0;
    const numericEsts = items.map(i => parseFloat(i.estimate)).filter(v => !isNaN(v));
    const sum = numericEsts.reduce((a, b) => a + b, 0);

    const now = new Date().toLocaleString('ru-RU', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
    document.getElementById('printFooter').textContent = `Scrum Poker · ${title} · ${now}`;

    let html = `
    <div class="summary">
        <div class="stat"><div class="stat-val">${total}</div><div class="stat-lbl">Задач</div></div>
        <div class="stat"><div class="stat-val">${estimated}</div><div class="stat-lbl">Оценено</div></div>
        <div class="stat"><div class="stat-val">${pct}%</div><div class="stat-lbl">Прогресс</div></div>
        ${numericEsts.length > 0 ? `<div class="stat"><div class="stat-val">${Math.round(sum * 10) / 10}</div><div class="stat-lbl">Σ поинтов</div></div>` : ''}
    </div>
    <div class="progress-wrap">
        <div class="progress-label">Оценено ${estimated} из ${total}</div>
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="table-wrap">
    <table>
        <thead><tr><th class="num">#</th><th>Задача</th><th>Оценка</th></tr></thead>
        <tbody>`;

    items.forEach((it, i) => {
        const est = it.estimate
            ? `<span class="est-chip">${esc(it.estimate)}</span>`
            : `<span class="no-est">—</span>`;
        html += `<tr><td class="num">${i + 1}</td><td class="task-title">${esc(it.title)}</td><td>${est}</td></tr>`;
    });

    html += `</tbody></table></div>`;
    document.getElementById('content').innerHTML = html;

    if (params.get('print') === '1') setTimeout(() => window.print(), 400);
}

function showError(msg) {
    document.getElementById('content').innerHTML =
        `<div class="error"><strong>Ошибка</strong>${esc(msg)}</div>`;
}

const params = new URLSearchParams(location.search);

function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g, c =>
        ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
</script>
</body>
</html>
