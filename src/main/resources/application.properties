server.port=8080
spring.application.name=scrum-poker

# Статика: кэш в production (1 день), фронтенд версионирован через ?v=N
spring.web.resources.cache.period=86400

# CORS: домен приложения (переопределяется через env ALLOWED_ORIGIN)
app.allowed-origin=${ALLOWED_ORIGIN:http://localhost:8080}

# TTL неактивных комнат в часах (переопределяется через env ROOM_TTL_HOURS)
app.room-ttl-hours=${ROOM_TTL_HOURS:8}

# Health endpoint для Docker healthcheck
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Логирование (logback-spring.xml). Путь и уровень переопределяются через env.
app.log.path=${LOG_PATH:logs}
# Уровень для пакета com.scrumpoker (INFO/DEBUG/WARN)
# задаётся через env LOG_LEVEL_APP

# База данных
# Локально: H2 in-memory (без настройки)
# Production: задать DATABASE_URL=jdbc:postgresql://host:5432/db?user=u&password=p
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:scrumpoker;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.sql.init.mode=always
spring.sql.init.platform=all
