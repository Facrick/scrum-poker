server.port=8080
spring.application.name=scrum-poker

# Доверять заголовкам X-Forwarded-Proto/Host от обратного прокси (Railway, nginx).
# Без этого Spring строит redirect URI с http://, а не https://, и Google отклоняет запрос.
server.forward-headers-strategy=NATIVE

# Статика: кэш в production (1 день), фронтенд версионирован через ?v=N
spring.web.resources.cache.period=86400

# CORS: домен приложения (переопределяется через env ALLOWED_ORIGIN)
app.allowed-origin=${ALLOWED_ORIGIN:http://localhost:8080}

# TTL неактивных комнат в часах (переопределяется через env ROOM_TTL_HOURS)
app.room-ttl-hours=${ROOM_TTL_HOURS:8}

# Health endpoint
management.endpoints.web.exposure.include=health
# Показываем детали (в т.ч. индикатор persistence с числом сбоев записи в БД)
management.endpoint.health.show-details=always
# Liveness/readiness пробы: Docker-healthcheck бьёт в liveness, чтобы сбой БД
# (индикатор persistence) не вызывал рестарт контейнера.
management.endpoint.health.probes.enabled=true

# Логирование настраивается в logback-spring.xml.
# Переменные окружения (читаются logback напрямую):
#   LOG_PATH       — каталог логов (по умолчанию ./logs)
#   LOG_LEVEL_APP  — уровень для пакета com.scrumpoker (INFO/DEBUG/WARN)
#   SPRING_PROFILES_ACTIVE=json — структурированные JSON-логи (для OpenSearch)

# OAuth2 — ЛК модераторов (Google + GitHub)
# Зарегистрируйте приложение и задайте секреты через env-переменные:
#   GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET
#   GITHUB_CLIENT_ID, GITHUB_CLIENT_SECRET
# Без этих переменных кнопки "Войти" вернут ошибку OAuth, анонимный поток не затрагивается.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:disabled-configure-via-env}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:disabled-configure-via-env}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:disabled-configure-via-env}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:disabled-configure-via-env}
spring.security.oauth2.client.registration.github.scope=read:user,user:email

# База данных
# Локально: H2 in-memory (без настройки)
# Production: задать DATABASE_URL=jdbc:postgresql://host:5432/db?user=u&password=p
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:scrumpoker;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.sql.init.mode=always
spring.sql.init.platform=all
