worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/javascript application/json;

    # Ограничение входящих соединений с одного IP (базовая защита от DDoS)
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # ── HTTP → HTTPS редирект ────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS ────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name YOUR_DOMAIN;   # ← заменить на реальный домен

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        limit_req  zone=general burst=60 nodelay;
        limit_conn addr 20;

        # ── Статика (кэширование) ──
        location ~* \.(css|js|png|jpg|svg|ico|woff2?)$ {
            proxy_pass http://app:8080;
            proxy_cache_valid 200 1d;
            add_header Cache-Control "public, max-age=86400";
        }

        # ── WebSocket (SockJS) ──
        location /ws {
            proxy_pass http://app:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_read_timeout 3600s;   # держим WS-соединения живыми
        }

        # ── REST API и всё остальное ──
        location / {
            proxy_pass http://app:8080;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
