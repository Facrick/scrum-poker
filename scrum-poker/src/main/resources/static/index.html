<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrum Poker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=13">
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>

<!-- ===== Лобби ===== -->
<main id="lobby" class="lobby">
    <div class="lobby-card">
        <div class="brand">Scrum&nbsp;Poker</div>
        <p id="lobbySub" class="lobby-sub">Оценка задач командой в реальном времени</p>

        <label class="field">
            <span>Ваше имя</span>
            <input id="nameInput" type="text" maxlength="40" placeholder="Например, Алиса" autocomplete="new-password">
        </label>

        <label class="field hidden" id="roomNameField">
            <span>Название сессии</span>
            <input id="roomNameInput" type="text" maxlength="60" placeholder="Например, Спринт 42" autocomplete="new-password">
        </label>

        <label class="field hidden" id="roleField">
            <span>Роль</span>
            <select id="roleSelect">
                <option value="PLAYER">Участник (голосует)</option>
                <option value="OBSERVER">Наблюдатель</option>
            </select>
        </label>

        <button id="primaryBtn" class="btn btn-primary btn-block">Создать комнату</button>
        <p id="lobbyError" class="form-error"></p>
    </div>
    <footer class="lobby-foot">До 100 участников в комнате · без регистрации</footer>
</main>

<!-- ===== Комната ===== -->
<div id="room" class="room hidden">
    <header class="topbar">
        <div class="topbar-left">
            <div>
                <h1 id="roomName" class="room-title">Комната</h1>
                <div id="storyLabel" class="room-story">Задача не задана</div>
            </div>
        </div>
        <div class="topbar-right">
            <div id="timerDisplay" class="timer-badge hidden">
                <span id="timerValue">0:00</span>
            </div>
            <span id="connDot" class="conn-dot" title="Соединение"></span>
            <span id="onlineCount" class="pill">👥 0</span>
            <button id="toggleBacklogBtn" class="btn btn-ghost" title="Бэклог">📋</button>
            <button id="copyLinkBtn" class="btn btn-ghost">🔗 Пригласить</button>
        </div>
    </header>

    <section id="moderatorPanel" class="mod-panel hidden">
        <!-- Строка 1: задача -->
        <div class="mod-row">
            <input id="storyInput" type="text" class="mod-input" placeholder="Название задачи → добавит в бэклог" autocomplete="off">
            <button id="setStoryBtn" class="btn btn-ghost">Задать</button>
        </div>
        <!-- Строка 2: колода + таймер + действия -->
        <div class="mod-row">
            <select id="deckChange" class="mod-select" title="Колода">
                <option value="FIBONACCI">Фибоначчи</option>
                <option value="POWERS_OF_TWO">Степени двойки</option>
                <option value="TSHIRT">Майки</option>
                <option value="CUSTOM">Своя колода…</option>
            </select>
            <div id="customDeckWrap" class="custom-deck-wrap hidden">
                <input id="customCardsInput" type="text" class="mod-input" maxlength="120"
                       placeholder="1, 2, 4, 8, XL, ? (через запятую)" autocomplete="off">
                <button id="applyCustomDeckBtn" class="btn btn-ghost">Применить</button>
            </div>
            <div class="timer-wrap">
                <select id="timerSelect" class="mod-select" title="Таймер">
                    <option value="0">⏱ Без таймера</option>
                    <option value="30">30 сек</option>
                    <option value="60">1 мин</option>
                    <option value="90">1:30</option>
                    <option value="120">2 мин</option>
                    <option value="180">3 мин</option>
                </select>
                <button id="startTimerBtn" class="btn btn-ghost" title="Запустить таймер">▶ Старт</button>
                <button id="stopTimerBtn" class="btn btn-ghost hidden" title="Остановить таймер">■ Стоп</button>
            </div>
            <span class="mod-spacer"></span>
            <button id="revealBtn" class="btn btn-success">Вскрыть карты</button>
            <button id="resetBtn" class="btn btn-secondary">Новый раунд</button>
        </div>
    </section>

    <div class="room-body">
        <section class="stage">
            <div id="table" class="table"></div>
            <div id="results" class="results hidden"></div>
            <div id="waitHint" class="wait-hint"></div>
        </section>

        <aside id="backlogPanel" class="backlog-panel hidden">
            <div class="backlog-header">
                <span class="backlog-title-bar">📋 Бэклог</span>
                <button id="exportCsvBtn" class="btn btn-ghost btn-sm" title="Экспорт в Excel">⬇ XLS</button>
            </div>
            <div id="backlogList" class="backlog-list"></div>
        </aside>
    </div>

    <footer id="deckBar" class="deckbar">
        <div id="deck" class="deck"></div>
        <p id="deckHint" class="deck-hint">Выберите карту</p>
    </footer>
</div>

<div id="toast" class="toast"></div>

<script src="app.js?v=13"></script>
</body>
</html>
