server.port=8080
spring.application.name=scrum-poker

# Статика: кэш в production (1 день), фронтенд версионирован через ?v=N
spring.web.resources.cache.period=86400

# CORS: домен приложения (переопределяется через env ALLOWED_ORIGIN)
app.allowed-origin=${ALLOWED_ORIGIN:http://localhost:8080}

# TTL неактивных комнат в часах (переопределяется через env ROOM_TTL_HOURS)
app.room-ttl-hours=${ROOM_TTL_HOURS:8}

# Health endpoint для Docker healthcheck
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
