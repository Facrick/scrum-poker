name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Нужно для публикации Allure-отчёта в GitHub Pages (ветка gh-pages)
permissions:
  contents: write

jobs:
  test:
    name: Сборка и тесты
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Установка JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Запуск тестов (mvn verify)
        run: mvn -B -ntp verify

      - name: Генерация Allure-отчёта
        if: always()
        run: mvn -B -ntp allure:report

      - name: Публикация результатов тестов (JUnit)
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Результаты тестов
          path: target/surefire-reports/*.xml
          reporter: java-junit

      - name: Загрузка Allure-отчёта как артефакта
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/site/allure-maven-plugin
          if-no-files-found: warn

      - name: Загрузка сырых результатов и логов
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            target/allure-results
            target/surefire-reports
          if-no-files-found: warn

      - name: Деплой Allure-отчёта в GitHub Pages
        if: always() && github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: target/site/allure-maven-plugin
          publish_branch: gh-pages
