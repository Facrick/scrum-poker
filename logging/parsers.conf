# Парсер для JSON-строк от logstash-logback-encoder.
# Поле @timestamp используется как время события; при сбое парсинга
# Fluent Bit подставит время приёма (данные не теряются).
[PARSER]
    Name        json
    Format      json
    Time_Key    @timestamp
    Time_Format %Y-%m-%dT%H:%M:%S.%L%z
    Time_Keep   On
