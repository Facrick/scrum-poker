[SERVICE]
    Flush             5
    Daemon            Off
    Log_Level         info
    Parsers_File      parsers.conf

# Тейлим JSON-лог приложения из общего тома
[INPUT]
    Name              tail
    Path              /logs/scrum-poker.json
    Tag               scrumpoker
    Parser            json
    Refresh_Interval  5
    DB                /logs/.fluentbit.db
    Skip_Long_Lines   On
    Buffer_Max_Size   1MB

# Отправляем в OpenSearch (security в dev-стеке отключён)
[OUTPUT]
    Name                opensearch
    Match               *
    Host                opensearch
    Port                9200
    Index               scrum-poker-logs
    Suppress_Type_Name  On
    Logstash_Format     Off
    Generate_ID         On
    tls                 Off
    Trace_Error         On
