services:

  app:
    build: .
    restart: unless-stopped
    environment:
      # Домен, с которого разрешены WebSocket-подключения.
      # Замените на ваш реальный домен перед деплоем.
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-http://localhost}
      # Через сколько часов неактивная комната удаляется (по умолчанию 8 ч)
      - ROOM_TTL_HOURS=${ROOM_TTL_HOURS:-8}
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro   # SSL-сертификаты (Let's Encrypt)
    depends_on:
      app:
        condition: service_healthy
